# Stage A — Concept Physics on dSprites / synthetic factor data.
# Plan-spec on A100 80GB with the DINOSAUR-style token decoder:
# ~33M params, ~2-3 steps/s expected.

seed: 0
device: cuda  # or cpu / mps
out_dir: outputs/stage_a

data:
  source: dsprites          # dsprites | synthetic
  root: data/raw            # location of dsprites_*.npz if source=dsprites
  image_size: 64
  in_channels: 1
  batch_size: 64            # safe with token decoder; tune up if VRAM allows
  num_workers: 4
  two_view: true
  held_out_count: 4         # number of (shape, scale) tuples to exclude from training
  held_out_keys: [shape, scale]

model:
  feat_dim: 448
  slot_dim: 512             # PLAN SPEC = 16 roles * 32 filler_dim
  num_slots: 64             # PLAN SPEC
  num_roles: 16             # PLAN SPEC
  filler_dim: 32            # PLAN SPEC
  slot_iters: 3
  sinkhorn_iters: 3
  decoder_type: token       # DINOSAUR-style; ~64x cheaper than 'spatial'
  decoder_hidden: 768
  decoder_layers: 6

training:
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 0.5
  warmup_steps: 1000
  total_steps: 10000
  aux_warmup_frac: 0.05
  patch_size: 8
  mask_ratio: 0.4
  pred_weight: 1.0
  vicreg_var_weight: 0.0
  vicreg_cov_weight: 0.2
  vicreg_total_weight: 0.5
  consistency_weight: 0.3
  usage_balance_weight: 0.1
  log_every: 50
  eval_every: 1000
  use_amp: true

eval:
  n_eval_samples: 2048
  factors_to_probe: [shape, scale, orientation, pos_x, pos_y]

# Weights & Biases. Set `enabled: true` and export WANDB_API_KEY before running.
# Or run `wandb login` once on the box.
wandb:
  enabled: false
  project: glr-stage-a
  run_name: null        # null => uses f"seed{seed}"
  tags: []
